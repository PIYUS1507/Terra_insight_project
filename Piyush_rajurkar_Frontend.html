<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PortPulse — Weekly Demand Grid</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0c10;
    --surface: #111318;
    --surface2: #181c24;
    --border: #222633;
    --border2: #2e3445;
    --text: #e8eaf0;
    --text-dim: #7c849a;
    --text-muted: #4a5068;
    --accent: #4f7fff;
    --accent2: #7c5cfc;
    --green: #2dd4a0;
    --green-bg: rgba(45,212,160,0.12);
    --amber: #f5a623;
    --amber-bg: rgba(245,166,35,0.12);
    --red: #f0516a;
    --red-bg: rgba(240,81,106,0.12);
    --radius: 8px;
    --font-display: 'Syne', sans-serif;
    --font-mono: 'DM Mono', monospace;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: var(--font-mono);
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* ── HEADER ── */
  header {
    padding: 20px 32px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
    background: var(--surface);
    position: sticky;
    top: 0;
    z-index: 100;
  }

  .logo {
    font-family: var(--font-display);
    font-weight: 800;
    font-size: 1.2rem;
    letter-spacing: -0.02em;
    color: var(--text);
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .logo-dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: var(--accent);
    box-shadow: 0 0 10px var(--accent);
  }

  .header-meta {
    font-size: 0.72rem;
    color: var(--text-muted);
    letter-spacing: 0.08em;
    text-transform: uppercase;
  }

  /* ── TOOLBAR ── */
  .toolbar {
    padding: 16px 32px;
    display: flex;
    align-items: center;
    gap: 16px;
    flex-wrap: wrap;
    border-bottom: 1px solid var(--border);
    background: var(--surface);
  }

  .toolbar-group {
    display: flex;
    align-items: center;
    gap: 8px;
  }

  label.toolbar-label {
    font-size: 0.68rem;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--text-muted);
  }

  select, .btn {
    font-family: var(--font-mono);
    font-size: 0.78rem;
    background: var(--surface2);
    color: var(--text);
    border: 1px solid var(--border2);
    border-radius: var(--radius);
    padding: 7px 12px;
    cursor: pointer;
    outline: none;
    transition: border-color 0.2s, background 0.2s;
  }

  select:hover, .btn:hover {
    border-color: var(--accent);
    background: #1e2330;
  }

  select:focus { border-color: var(--accent); }

  .btn {
    display: flex; align-items: center; gap: 6px;
    font-weight: 500;
  }

  .btn-primary {
    background: var(--accent);
    border-color: var(--accent);
    color: #fff;
    font-weight: 600;
  }
  .btn-primary:hover { background: #3d6be8; border-color: #3d6be8; }

  .btn-ghost { background: transparent; color: var(--text-dim); }
  .btn-ghost:hover { color: var(--text); }

  /* status checkboxes */
  .status-filters {
    display: flex; gap: 8px; align-items: center;
  }

  .status-chip {
    display: flex; align-items: center; gap: 5px;
    padding: 5px 10px;
    border-radius: 20px;
    border: 1px solid var(--border2);
    font-size: 0.72rem;
    cursor: pointer;
    user-select: none;
    transition: all 0.15s;
  }

  .status-chip input { display: none; }

  .status-chip.active-chip   { border-color: var(--green); color: var(--green); background: var(--green-bg); }
  .status-chip.paused-chip   { border-color: var(--amber); color: var(--amber); background: var(--amber-bg); }
  .status-chip.disc-chip     { border-color: var(--red);   color: var(--red);   background: var(--red-bg); }
  .status-chip.unchecked     { opacity: 0.4; }

  /* ── MAIN LAYOUT ── */
  .main-wrap {
    display: flex;
    height: calc(100vh - 120px);
  }

  /* ── TABLE AREA ── */
  .table-area {
    flex: 1;
    overflow: auto;
    padding: 24px 32px;
    transition: margin-right 0.3s;
  }

  .table-area.panel-open {
    margin-right: 380px;
  }

  /* ── TABLE ── */
  .table-wrap {
    border: 1px solid var(--border);
    border-radius: 10px;
    overflow: hidden;
  }

  table {
    width: 100%;
    border-collapse: collapse;
    font-size: 0.78rem;
  }

  thead {
    background: var(--surface);
    position: sticky;
    top: 0;
    z-index: 10;
  }

  th {
    padding: 12px 14px;
    text-align: left;
    font-size: 0.65rem;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--text-muted);
    border-bottom: 1px solid var(--border);
    white-space: nowrap;
  }

  th.sortable {
    cursor: pointer;
    user-select: none;
    transition: color 0.15s;
  }
  th.sortable:hover { color: var(--text); }
  th.sortable.sorted { color: var(--accent); }

  .sort-icon { margin-left: 4px; opacity: 0.7; }

  tbody tr {
    border-bottom: 1px solid var(--border);
    cursor: pointer;
    transition: background 0.12s;
  }

  tbody tr:last-child { border-bottom: none; }
  tbody tr:hover { background: rgba(79,127,255,0.06); }
  tbody tr.selected { background: rgba(79,127,255,0.1); }

  td {
    padding: 10px 14px;
    color: var(--text);
    white-space: nowrap;
  }

  td.item-name {
    font-weight: 500;
    color: var(--text);
  }

  td.category-cell {
    color: var(--text-dim);
    font-size: 0.72rem;
  }

  td.region-cell {
    color: var(--text-muted);
    font-size: 0.72rem;
  }

  /* demand cells */
  .demand-cell {
    text-align: right;
    border-radius: 4px;
    padding: 4px 8px;
    font-variant-numeric: tabular-nums;
    font-weight: 500;
  }

  .demand-cell.green { background: var(--green-bg); color: var(--green); }
  .demand-cell.amber { background: var(--amber-bg); color: var(--amber); }
  .demand-cell.red   { background: var(--red-bg);   color: var(--red); }

  td .demand-cell { display: inline-block; min-width: 44px; text-align: right; }

  /* total column */
  td.total-cell {
    font-weight: 600;
    color: var(--text);
    font-variant-numeric: tabular-nums;
  }

  /* summary row */
  tr.summary-row {
    background: var(--surface) !important;
    cursor: default !important;
    border-top: 2px solid var(--border2);
  }

  tr.summary-row td {
    font-size: 0.68rem;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    color: var(--text-muted);
    padding-top: 10px;
    padding-bottom: 10px;
  }

  tr.summary-row td.summary-val {
    font-variant-numeric: tabular-nums;
    font-weight: 600;
    color: var(--text-dim);
    font-size: 0.78rem;
    text-transform: none;
    letter-spacing: 0;
    text-align: right;
  }

  tr.summary-row td.summary-total {
    color: var(--accent);
    font-size: 0.78rem;
    font-weight: 700;
  }

  /* status badge */
  .badge {
    display: inline-flex; align-items: center; gap: 5px;
    padding: 3px 8px;
    border-radius: 20px;
    font-size: 0.65rem;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    font-weight: 600;
  }

  .badge::before {
    content: '';
    width: 5px; height: 5px;
    border-radius: 50%;
  }

  .badge.active   { background: var(--green-bg); color: var(--green); }
  .badge.active::before { background: var(--green); box-shadow: 0 0 4px var(--green); }

  .badge.paused   { background: var(--amber-bg); color: var(--amber); }
  .badge.paused::before { background: var(--amber); }

  .badge.discontinued { background: var(--red-bg); color: var(--red); }
  .badge.discontinued::before { background: var(--red); }

  /* ── SIDE PANEL ── */
  .side-panel {
    position: fixed;
    right: -400px;
    top: 61px;
    width: 380px;
    height: calc(100vh - 61px);
    background: var(--surface);
    border-left: 1px solid var(--border);
    overflow-y: auto;
    padding: 24px;
    transition: right 0.3s cubic-bezier(0.22,1,0.36,1);
    z-index: 50;
  }

  .side-panel.open { right: 0; }

  .panel-header {
    display: flex; align-items: flex-start; justify-content: space-between;
    margin-bottom: 20px;
  }

  .panel-title {
    font-family: var(--font-display);
    font-size: 1.1rem;
    font-weight: 700;
    line-height: 1.3;
  }

  .panel-sub {
    font-size: 0.72rem;
    color: var(--text-muted);
    margin-top: 4px;
    display: flex; gap: 8px; align-items: center;
  }

  .btn-close {
    background: none; border: 1px solid var(--border2);
    color: var(--text-muted);
    width: 28px; height: 28px;
    border-radius: 6px;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer; font-size: 1rem;
    flex-shrink: 0;
    transition: all 0.15s;
  }
  .btn-close:hover { border-color: var(--red); color: var(--red); }

  .panel-section {
    margin-bottom: 20px;
    border: 1px solid var(--border);
    border-radius: var(--radius);
    overflow: hidden;
  }

  .panel-section-title {
    font-size: 0.62rem;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--text-muted);
    padding: 10px 14px;
    background: var(--surface2);
    border-bottom: 1px solid var(--border);
  }

  .panel-section-body { padding: 14px; }

  .stat-grid {
    display: grid; grid-template-columns: 1fr 1fr; gap: 10px;
  }

  .stat-box {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 10px 12px;
  }

  .stat-label {
    font-size: 0.62rem;
    color: var(--text-muted);
    text-transform: uppercase;
    letter-spacing: 0.08em;
    margin-bottom: 4px;
  }

  .stat-value {
    font-size: 1.1rem;
    font-weight: 600;
    font-family: var(--font-display);
  }

  .stat-value.green { color: var(--green); }
  .stat-value.amber { color: var(--amber); }
  .stat-value.red   { color: var(--red); }

  .tracking-badge {
    display: inline-flex; align-items: center; gap: 6px;
    padding: 6px 12px;
    border-radius: 6px;
    font-size: 0.75rem;
    font-weight: 600;
    margin-top: 8px;
  }

  .tracking-badge.on-target   { background: var(--green-bg); color: var(--green); border: 1px solid rgba(45,212,160,0.3); }
  .tracking-badge.below-target { background: var(--amber-bg); color: var(--amber); border: 1px solid rgba(245,166,35,0.3); }
  .tracking-badge.at-risk      { background: var(--red-bg);   color: var(--red);   border: 1px solid rgba(240,81,106,0.3); }

  /* mini chart */
  .sparkline-wrap { padding: 8px 0 4px; }
  .sparkline-bars { display: flex; align-items: flex-end; gap: 4px; height: 60px; }
  .spark-bar-col  { flex: 1; display: flex; flex-direction: column; align-items: center; gap: 3px; }
  .spark-bar {
    width: 100%; border-radius: 3px 3px 0 0;
    transition: height 0.3s ease;
  }
  .spark-label { font-size: 0.58rem; color: var(--text-muted); }

  /* weekly detail list */
  .week-row {
    display: flex; align-items: center; gap: 10px;
    padding: 6px 0;
    border-bottom: 1px solid var(--border);
    font-size: 0.76rem;
  }
  .week-row:last-child { border-bottom: none; }
  .week-label { color: var(--text-muted); width: 24px; }
  .week-bar-bg { flex: 1; background: var(--surface2); border-radius: 3px; height: 6px; }
  .week-bar-fill { height: 100%; border-radius: 3px; }
  .week-val { width: 36px; text-align: right; font-variant-numeric: tabular-nums; }

  /* ── MODAL ── */
  .modal-overlay {
    display: none;
    position: fixed; inset: 0;
    background: rgba(0,0,0,0.7);
    backdrop-filter: blur(4px);
    z-index: 200;
    align-items: center;
    justify-content: center;
  }

  .modal-overlay.open { display: flex; }

  .modal {
    background: var(--surface);
    border: 1px solid var(--border2);
    border-radius: 12px;
    width: 560px;
    max-width: calc(100vw - 32px);
    max-height: calc(100vh - 40px);
    overflow-y: auto;
    padding: 28px;
    animation: modalIn 0.25s cubic-bezier(0.22,1,0.36,1);
  }

  @keyframes modalIn {
    from { opacity: 0; transform: translateY(16px) scale(0.97); }
    to   { opacity: 1; transform: none; }
  }

  .modal-title {
    font-family: var(--font-display);
    font-size: 1.15rem;
    font-weight: 700;
    margin-bottom: 20px;
    display: flex; align-items: center; justify-content: space-between;
  }

  .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
  .form-group { display: flex; flex-direction: column; gap: 5px; }
  .form-group.full { grid-column: span 2; }

  .form-label {
    font-size: 0.65rem;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: var(--text-muted);
  }

  .form-input {
    font-family: var(--font-mono);
    font-size: 0.8rem;
    background: var(--surface2);
    color: var(--text);
    border: 1px solid var(--border2);
    border-radius: 6px;
    padding: 8px 12px;
    outline: none;
    transition: border-color 0.2s;
  }

  .form-input:focus { border-color: var(--accent); }
  .form-input.error { border-color: var(--red); }

  .error-msg {
    font-size: 0.68rem;
    color: var(--red);
    min-height: 1em;
  }

  .weekly-inputs {
    display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px;
    margin-top: 4px;
  }

  .week-input-wrap { display: flex; flex-direction: column; gap: 3px; }
  .week-input-label { font-size: 0.6rem; color: var(--text-muted); }

  .modal-footer {
    display: flex; justify-content: flex-end; gap: 10px;
    margin-top: 20px; padding-top: 16px;
    border-top: 1px solid var(--border);
  }

  /* ── EMPTY STATE ── */
  .empty-row td {
    text-align: center;
    padding: 40px;
    color: var(--text-muted);
    font-size: 0.8rem;
  }

  /* ── SCROLLBAR ── */
  ::-webkit-scrollbar { width: 6px; height: 6px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 3px; }
  ::-webkit-scrollbar-thumb:hover { background: #3e4560; }

  /* animations */
  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(6px); }
    to   { opacity: 1; transform: none; }
  }

  tbody tr { animation: fadeIn 0.2s ease both; }
  tbody tr:nth-child(1)  { animation-delay: 0.02s; }
  tbody tr:nth-child(2)  { animation-delay: 0.04s; }
  tbody tr:nth-child(3)  { animation-delay: 0.06s; }
  tbody tr:nth-child(4)  { animation-delay: 0.08s; }
  tbody tr:nth-child(5)  { animation-delay: 0.10s; }
  tbody tr:nth-child(6)  { animation-delay: 0.12s; }
  tbody tr:nth-child(7)  { animation-delay: 0.14s; }
  tbody tr:nth-child(8)  { animation-delay: 0.16s; }
  tbody tr:nth-child(9)  { animation-delay: 0.18s; }
  tbody tr:nth-child(10) { animation-delay: 0.20s; }

  .btn-icon { font-size: 0.9rem; }

  .spacer { flex: 1; }
</style>
</head>
<body>

<header>
  <div class="logo">
    <div class="logo-dot"></div>
    PortPulse
  </div>
  <div class="header-meta">Weekly Demand Grid · Planning Dashboard</div>
</header>

<div class="toolbar">
  <div class="toolbar-group">
    <label class="toolbar-label" for="cat-filter">Category</label>
    <select id="cat-filter">
      <option value="All">All Categories</option>
      <option>Electronics</option>
      <option>Textiles</option>
      <option>Chemicals</option>
      <option>Furniture</option>
      <option>Pharma</option>
    </select>
  </div>

  <div class="toolbar-group" style="gap:10px;">
    <label class="toolbar-label">Status</label>
    <div class="status-filters">
      <label class="status-chip active-chip" id="chip-active">
        <input type="checkbox" id="chk-active" checked> Active
      </label>
      <label class="status-chip paused-chip" id="chip-paused">
        <input type="checkbox" id="chk-paused" checked> Paused
      </label>
      <label class="status-chip disc-chip" id="chip-disc">
        <input type="checkbox" id="chk-disc" checked> Discontinued
      </label>
    </div>
  </div>

  <div class="spacer"></div>

  <button class="btn btn-ghost" id="btn-reset">
    <span class="btn-icon">↺</span> Reset
  </button>
  <button class="btn btn-primary" id="btn-add">
    <span class="btn-icon">＋</span> Add Item
  </button>
</div>

<div class="main-wrap">
  <div class="table-area" id="table-area">
    <div class="table-wrap">
      <table id="main-table">
        <thead>
          <tr>
            <th>Item</th>
            <th>Category</th>
            <th>Region</th>
            <th>Status</th>
            <th class="sortable" data-week="0">W1<span class="sort-icon"></span></th>
            <th class="sortable" data-week="1">W2<span class="sort-icon"></span></th>
            <th class="sortable" data-week="2">W3<span class="sort-icon"></span></th>
            <th class="sortable" data-week="3">W4<span class="sort-icon"></span></th>
            <th class="sortable" data-week="4">W5<span class="sort-icon"></span></th>
            <th class="sortable" data-week="5">W6<span class="sort-icon"></span></th>
            <th class="sortable" data-week="6">W7<span class="sort-icon"></span></th>
            <th class="sortable" data-week="7">W8<span class="sort-icon"></span></th>
            <th>Total</th>
          </tr>
        </thead>
        <tbody id="table-body"></tbody>
      </table>
    </div>
  </div>

  <div class="side-panel" id="side-panel">
    <div id="panel-content"></div>
  </div>
</div>

<!-- Add Item Modal -->
<div class="modal-overlay" id="modal-overlay">
  <div class="modal" role="dialog" aria-modal="true">
    <div class="modal-title">
      Add New Item
      <button class="btn-close" id="modal-close" aria-label="Close">✕</button>
    </div>
    <form id="add-form" novalidate>
      <div class="form-grid">
        <div class="form-group full">
          <label class="form-label" for="f-item">Item Name *</label>
          <input class="form-input" type="text" id="f-item" placeholder="e.g. Display Panels">
          <span class="error-msg" id="e-item"></span>
        </div>
        <div class="form-group">
          <label class="form-label" for="f-cat">Category *</label>
          <select class="form-input" id="f-cat">
            <option value="">Select…</option>
            <option>Electronics</option>
            <option>Textiles</option>
            <option>Chemicals</option>
            <option>Furniture</option>
            <option>Pharma</option>
          </select>
          <span class="error-msg" id="e-cat"></span>
        </div>
        <div class="form-group">
          <label class="form-label" for="f-region">Region *</label>
          <select class="form-input" id="f-region">
            <option value="">Select…</option>
            <option>North</option>
            <option>South</option>
            <option>East</option>
            <option>West</option>
          </select>
          <span class="error-msg" id="e-region"></span>
        </div>
        <div class="form-group">
          <label class="form-label" for="f-target">Target *</label>
          <input class="form-input" type="number" id="f-target" min="1" placeholder="e.g. 100">
          <span class="error-msg" id="e-target"></span>
        </div>
        <div class="form-group">
          <label class="form-label" for="f-status">Status *</label>
          <select class="form-input" id="f-status">
            <option value="">Select…</option>
            <option value="active">Active</option>
            <option value="paused">Paused</option>
            <option value="discontinued">Discontinued</option>
          </select>
          <span class="error-msg" id="e-status"></span>
        </div>
        <div class="form-group full">
          <label class="form-label">Weekly Demand (W1–W8) *</label>
          <div class="weekly-inputs" id="weekly-inputs"></div>
          <span class="error-msg" id="e-weekly"></span>
        </div>
      </div>
      <div class="modal-footer">
        <button type="button" class="btn btn-ghost" id="modal-cancel">Cancel</button>
        <button type="submit" class="btn btn-primary">Add Item</button>
      </div>
    </form>
  </div>
</div>

<script>
// ── DATA ──
const INITIAL_DATA = [
  { id:1, category:"Electronics", region:"North", item:"Display Panels",  weekly_demand:[120,135,98,150,160,142,130,155], target:140, status:"active" },
  { id:2, category:"Textiles",    region:"South", item:"Woven Fabric",    weekly_demand:[80,75,90,85,70,88,92,78],         target:85,  status:"active" },
  { id:3, category:"Chemicals",   region:"East",  item:"Solvent A",       weekly_demand:[40,38,0,42,45,0,39,41],           target:40,  status:"paused" },
  { id:4, category:"Furniture",   region:"West",  item:"Chair Frames",    weekly_demand:[200,195,210,190,205,215,200,198], target:200, status:"active" },
  { id:5, category:"Pharma",      region:"North", item:"Base Compound X", weekly_demand:[55,60,58,62,57,61,59,63],         target:60,  status:"active" },
  { id:6, category:"Electronics", region:"South", item:"Sensor Modules",  weekly_demand:[300,310,290,320,315,300,325,310], target:310, status:"active" },
  { id:7, category:"Textiles",    region:"West",  item:"Knit Rolls",      weekly_demand:[65,0,0,70,68,0,72,66],            target:68,  status:"paused" },
  { id:8, category:"Chemicals",   region:"North", item:"Reagent B",       weekly_demand:[22,25,23,0,0,0,0,0],              target:22,  status:"discontinued" },
  { id:9, category:"Furniture",   region:"East",  item:"Table Tops",      weekly_demand:[88,92,90,95,89,93,91,94],         target:90,  status:"active" },
  { id:10, category:"Pharma",     region:"South", item:"Tablet Binder",   weekly_demand:[110,108,115,112,109,114,111,113], target:112, status:"active" },
];

// Load from localStorage or use initial
let items = (() => {
  try {
    const saved = localStorage.getItem('portpulse_items');
    return saved ? JSON.parse(saved) : JSON.parse(JSON.stringify(INITIAL_DATA));
  } catch { return JSON.parse(JSON.stringify(INITIAL_DATA)); }
})();

let nextId = Math.max(...items.map(i => i.id)) + 1;

// ── STATE ──
let sortCol = null;
let sortDir = 1; // 1 = asc, -1 = desc
let selectedId = null;

function saveItems() {
  try { localStorage.setItem('portpulse_items', JSON.stringify(items)); } catch {}
}

// ── HELPERS ──
function demandClass(val, target) {
  if (val === 0 || val < target * 0.5) return 'red';
  if (val < target * 0.9) return 'amber';
  return 'green';
}

function getFiltered() {
  const cat = document.getElementById('cat-filter').value;
  const chkA = document.getElementById('chk-active').checked;
  const chkP = document.getElementById('chk-paused').checked;
  const chkD = document.getElementById('chk-disc').checked;

  return items.filter(item => {
    if (cat !== 'All' && item.category !== cat) return false;
    if (item.status === 'active'       && !chkA) return false;
    if (item.status === 'paused'       && !chkP) return false;
    if (item.status === 'discontinued' && !chkD) return false;
    return true;
  });
}

function getSorted(data) {
  if (sortCol === null) return data;
  return [...data].sort((a, b) => {
    const av = a.weekly_demand[sortCol];
    const bv = b.weekly_demand[sortCol];
    return sortDir * (av - bv);
  });
}

// ── RENDER ──
function render() {
  const filtered = getFiltered();
  const sorted = getSorted(filtered);
  const tbody = document.getElementById('table-body');
  tbody.innerHTML = '';

  if (sorted.length === 0) {
    const tr = document.createElement('tr');
    tr.className = 'empty-row';
    tr.innerHTML = '<td colspan="13">No items match the current filters.</td>';
    tbody.appendChild(tr);
  } else {
    sorted.forEach(item => {
      const tr = document.createElement('tr');
      if (item.id === selectedId) tr.classList.add('selected');
      const total = item.weekly_demand.reduce((s, v) => s + v, 0);
      const demandCells = item.weekly_demand.map(v => {
        const cls = demandClass(v, item.target);
        return `<td><span class="demand-cell ${cls}">${v}</span></td>`;
      }).join('');
      const statusLabel = item.status === 'discontinued' ? 'Discontinued' : item.status.charAt(0).toUpperCase() + item.status.slice(1);
      tr.innerHTML = `
        <td class="item-name">${esc(item.item)}</td>
        <td class="category-cell">${esc(item.category)}</td>
        <td class="region-cell">${esc(item.region)}</td>
        <td><span class="badge ${item.status}">${statusLabel}</span></td>
        ${demandCells}
        <td class="total-cell">${total.toLocaleString()}</td>
      `;
      tr.addEventListener('click', () => openPanel(item.id));
      tbody.appendChild(tr);
    });
  }

  // Summary row
  const sumRow = document.createElement('tr');
  sumRow.className = 'summary-row';
  const weekSums = Array(8).fill(0);
  let grandTotal = 0;
  sorted.forEach(item => {
    item.weekly_demand.forEach((v, i) => weekSums[i] += v);
    grandTotal += item.weekly_demand.reduce((s, v) => s + v, 0);
  });
  const weekSumCells = weekSums.map(s => `<td class="summary-val">${s.toLocaleString()}</td>`).join('');
  sumRow.innerHTML = `
    <td colspan="4" style="color:var(--text-muted);font-size:0.65rem;letter-spacing:0.1em;">Σ TOTALS (${sorted.length} items)</td>
    ${weekSumCells}
    <td class="summary-total">${grandTotal.toLocaleString()}</td>
  `;
  tbody.appendChild(sumRow);

  // Update sort indicators
  document.querySelectorAll('th.sortable').forEach(th => {
    th.classList.remove('sorted');
    const span = th.querySelector('.sort-icon');
    if (parseInt(th.dataset.week) === sortCol) {
      th.classList.add('sorted');
      span.textContent = sortDir === 1 ? ' ▲' : ' ▼';
    } else {
      span.textContent = '';
    }
  });
}

function esc(str) {
  return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

// ── PANEL ──
function openPanel(id) {
  const item = items.find(i => i.id === id);
  if (!item) return;
  selectedId = id;
  render();

  const panel = document.getElementById('side-panel');
  const content = document.getElementById('panel-content');
  const tableArea = document.getElementById('table-area');

  const avg = (item.weekly_demand.reduce((s,v)=>s+v,0) / 8).toFixed(1);
  const zeroWeeks = item.weekly_demand.filter(v => v === 0).length;
  const total = item.weekly_demand.reduce((s,v)=>s+v,0);
  const avgNum = parseFloat(avg);
  const trackingPct = avgNum / item.target;
  let trackingClass, trackingLabel;
  if (trackingPct >= 0.9) { trackingClass = 'on-target'; trackingLabel = '✓ On Target'; }
  else if (trackingPct >= 0.5) { trackingClass = 'below-target'; trackingLabel = '⚠ Below Target'; }
  else { trackingClass = 'at-risk'; trackingLabel = '✗ At Risk'; }

  const maxD = Math.max(...item.weekly_demand, 1);
  const sparkBars = item.weekly_demand.map((v, i) => {
    const pct = Math.round((v / maxD) * 100);
    const cls = demandClass(v, item.target);
    const colorMap = { green:'var(--green)', amber:'var(--amber)', red:'var(--red)' };
    return `<div class="spark-bar-col">
      <div class="spark-bar" style="height:${pct}%;background:${colorMap[cls]};opacity:0.8;"></div>
      <div class="spark-label">W${i+1}</div>
    </div>`;
  }).join('');

  const weekRows = item.weekly_demand.map((v, i) => {
    const cls = demandClass(v, item.target);
    const pct = Math.round((v / maxD) * 100);
    const colorMap = { green:'var(--green)', amber:'var(--amber)', red:'var(--red)' };
    return `<div class="week-row">
      <span class="week-label">W${i+1}</span>
      <div class="week-bar-bg"><div class="week-bar-fill" style="width:${pct}%;background:${colorMap[cls]};"></div></div>
      <span class="week-val" style="color:${colorMap[cls]}">${v}</span>
    </div>`;
  }).join('');

  const statusLabel = item.status === 'discontinued' ? 'Discontinued' : item.status.charAt(0).toUpperCase() + item.status.slice(1);

  content.innerHTML = `
    <div class="panel-header">
      <div>
        <div class="panel-title">${esc(item.item)}</div>
        <div class="panel-sub">
          <span class="badge ${item.status}">${statusLabel}</span>
          <span>${esc(item.category)}</span>
          <span style="color:var(--text-muted)">·</span>
          <span>${esc(item.region)}</span>
        </div>
      </div>
      <button class="btn-close" id="panel-close-btn" aria-label="Close panel">✕</button>
    </div>

    <div class="panel-section">
      <div class="panel-section-title">Performance Overview</div>
      <div class="panel-section-body">
        <div class="stat-grid">
          <div class="stat-box">
            <div class="stat-label">Average Demand</div>
            <div class="stat-value">${avg}</div>
          </div>
          <div class="stat-box">
            <div class="stat-label">Target</div>
            <div class="stat-value">${item.target}</div>
          </div>
          <div class="stat-box">
            <div class="stat-label">Total (W1–W8)</div>
            <div class="stat-value">${total.toLocaleString()}</div>
          </div>
          <div class="stat-box">
            <div class="stat-label">Zero Weeks</div>
            <div class="stat-value ${zeroWeeks > 0 ? 'red' : 'green'}">${zeroWeeks}</div>
          </div>
        </div>
        <div>
          <span class="tracking-badge ${trackingClass}">${trackingLabel}</span>
        </div>
      </div>
    </div>

    <div class="panel-section">
      <div class="panel-section-title">Weekly Trend</div>
      <div class="panel-section-body">
        <div class="sparkline-wrap">
          <div class="sparkline-bars">${sparkBars}</div>
        </div>
      </div>
    </div>

    <div class="panel-section">
      <div class="panel-section-title">Weekly Breakdown</div>
      <div class="panel-section-body" style="padding:10px 14px;">
        ${weekRows}
      </div>
    </div>
  `;

  panel.classList.add('open');
  tableArea.classList.add('panel-open');

  document.getElementById('panel-close-btn').addEventListener('click', closePanel);
}

function closePanel() {
  selectedId = null;
  const panel = document.getElementById('side-panel');
  const tableArea = document.getElementById('table-area');
  panel.classList.remove('open');
  tableArea.classList.remove('panel-open');
  render();
}

// ── SORT ──
document.querySelectorAll('th.sortable').forEach(th => {
  th.addEventListener('click', () => {
    const week = parseInt(th.dataset.week);
    if (sortCol === week) {
      if (sortDir === -1) { sortCol = null; sortDir = 1; }
      else sortDir = -1;
    } else {
      sortCol = week;
      sortDir = 1;
    }
    render();
  });
});

// ── FILTER EVENTS ──
document.getElementById('cat-filter').addEventListener('change', render);

['chk-active','chk-paused','chk-disc'].forEach(id => {
  document.getElementById(id).addEventListener('change', function() {
    const map = { 'chk-active':'chip-active', 'chk-paused':'chip-paused', 'chk-disc':'chip-disc' };
    document.getElementById(map[id]).classList.toggle('unchecked', !this.checked);
    render();
  });
});

document.getElementById('btn-reset').addEventListener('click', () => {
  document.getElementById('cat-filter').value = 'All';
  ['chk-active','chk-paused','chk-disc'].forEach(id => {
    document.getElementById(id).checked = true;
  });
  ['chip-active','chip-paused','chip-disc'].forEach(id => {
    document.getElementById(id).classList.remove('unchecked');
  });
  sortCol = null; sortDir = 1;
  render();
});

// ── MODAL ──
const modalOverlay = document.getElementById('modal-overlay');

function openModal() {
  document.getElementById('add-form').reset();
  // build weekly inputs
  const wrap = document.getElementById('weekly-inputs');
  wrap.innerHTML = Array.from({length:8},(_,i)=>`
    <div class="week-input-wrap">
      <label class="week-input-label">W${i+1}</label>
      <input class="form-input" type="number" id="f-w${i}" min="0" placeholder="0">
    </div>
  `).join('');
  clearErrors();
  modalOverlay.classList.add('open');
  document.getElementById('f-item').focus();
}

function closeModal() {
  modalOverlay.classList.remove('open');
}

document.getElementById('btn-add').addEventListener('click', openModal);
document.getElementById('modal-close').addEventListener('click', closeModal);
document.getElementById('modal-cancel').addEventListener('click', closeModal);
modalOverlay.addEventListener('click', e => { if (e.target === modalOverlay) closeModal(); });

function clearErrors() {
  ['e-item','e-cat','e-region','e-target','e-status','e-weekly'].forEach(id => {
    document.getElementById(id).textContent = '';
  });
  document.querySelectorAll('#add-form .form-input').forEach(el => el.classList.remove('error'));
}

function setError(fieldId, errId, msg) {
  document.getElementById(fieldId).classList.add('error');
  document.getElementById(errId).textContent = msg;
}

document.getElementById('add-form').addEventListener('submit', function(e) {
  e.preventDefault();
  clearErrors();
  let valid = true;

  const itemName = document.getElementById('f-item').value.trim();
  const cat      = document.getElementById('f-cat').value;
  const region   = document.getElementById('f-region').value;
  const target   = document.getElementById('f-target').value;
  const status   = document.getElementById('f-status').value;

  if (!itemName) { setError('f-item','e-item','Item name is required.'); valid = false; }
  if (!cat)      { setError('f-cat','e-cat','Please select a category.'); valid = false; }
  if (!region)   { setError('f-region','e-region','Please select a region.'); valid = false; }

  const targetNum = parseInt(target, 10);
  if (!target || isNaN(targetNum) || targetNum <= 0) {
    setError('f-target','e-target','Target must be a positive integer.'); valid = false;
  }
  if (!status) { setError('f-status','e-status','Please select a status.'); valid = false; }

  const weeklyVals = [];
  let weeklyOk = true;
  for (let i = 0; i < 8; i++) {
    const v = document.getElementById(`f-w${i}`).value;
    const n = parseInt(v, 10);
    if (v === '' || isNaN(n) || n < 0) { weeklyOk = false; break; }
    weeklyVals.push(n);
  }
  if (!weeklyOk) {
    document.getElementById('e-weekly').textContent = 'All 8 weekly values must be non-negative integers.';
    valid = false;
  }

  if (!valid) return;

  const newItem = {
    id: nextId++,
    category: cat,
    region: region,
    item: itemName,
    weekly_demand: weeklyVals,
    target: targetNum,
    status: status,
  };

  items.push(newItem);
  saveItems();
  closeModal();
  render();
});

// ── KEYBOARD ──
document.addEventListener('keydown', e => {
  if (e.key === 'Escape') {
    if (modalOverlay.classList.contains('open')) closeModal();
    else if (selectedId) closePanel();
  }
});

// ── INIT ──
render();
</script>
</body>
</html>
